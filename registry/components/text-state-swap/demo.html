<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Text State Swap - Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #demo {
        width: 1920px;
        height: 1080px;
        display: grid;
        place-items: center;
        background: #f7f7f8;
        font-family: Inter, system-ui, sans-serif;
      }
      .demo-frame {
        display: grid;
        place-items: center;
        min-width: 760px;
        min-height: 480px;
        padding: 56px;
      }
      .hf-transition-text-state-swap {
        position: relative;
        width: 250px;
        height: 36px;
        color: #18181b;
        font:
          900 28px/1 Inter,
          system-ui,
          sans-serif;
      }
      .hf-transition-text-state-swap span {
        position: absolute;
        left: 0;
        top: 0;
        filter: blur(var(--hf-text-blur, 0px));
        transform: translateY(var(--hf-text-y, 0px));
        will-change: transform, filter, opacity;
      }
      .hf-transition-text-state-swap .to {
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <div
      id="demo"
      data-composition-id="text-state-swap-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5"
    >
      <div class="demo-frame">
        <div class="hf-transition-text-state-swap">
          <span class="from">Saving draft</span><span class="to">Saved</span>
        </div>
      </div>
      <script>
        const tl = gsap.timeline({ paused: true });
        const startTime = 0.5;
        tl.to(
          ".hf-transition-text-state-swap .from",
          {
            opacity: 0,
            "--hf-text-y": "-18px",
            "--hf-text-blur": "8px",
            duration: 0.18,
            ease: "power2.in",
          },
          startTime,
        );
        tl.fromTo(
          ".hf-transition-text-state-swap .to",
          { opacity: 0, "--hf-text-y": "18px", "--hf-text-blur": "8px" },
          {
            opacity: 1,
            "--hf-text-y": "0px",
            "--hf-text-blur": "0px",
            duration: 0.26,
            ease: "power2.out",
          },
          startTime + 0.12,
        );
        tl.set({}, {}, 5);
        window.__timelines = window.__timelines || {};
        window.__timelines["text-state-swap-demo"] = tl;
      </script>
    </div>
  </body>
</html>
