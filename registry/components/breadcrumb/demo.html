<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Breadcrumb - Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #demo {
        width: 1920px;
        height: 1080px;
        display: grid;
        place-items: center;
        background: #f7f7f8;
        font-family: Inter, system-ui, sans-serif;
      }
      .demo-frame {
        display: grid;
        place-items: center;
        min-width: 760px;
        min-height: 480px;
        padding: 56px;
      }
      .hf-ui-breadcrumb {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        color: #71717a;
        font:
          750 14px/1 Inter,
          system-ui,
          sans-serif;
      }
      .hf-ui-breadcrumb i {
        color: #d4d4d8;
        font-style: normal;
      }
      .hf-ui-breadcrumb strong {
        color: #18181b;
      }
    </style>
  </head>
  <body>
    <div
      id="demo"
      data-composition-id="breadcrumb-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5"
    >
      <div class="demo-frame">
        <nav class="hf-ui-breadcrumb" aria-label="Breadcrumb">
          <span>Projects</span><i>/</i><span>Launch</span><i>/</i><strong>Preview</strong>
        </nav>
      </div>
      <script>
        const tl = gsap.timeline({ paused: true });
        const startTime = 0.45;
        tl.fromTo(
          ".hf-ui-breadcrumb > *",
          { opacity: 0, x: -8 },
          { opacity: 1, x: 0, duration: 0.22, stagger: 0.045, ease: "power2.out" },
          startTime,
        );
        tl.set({}, {}, 5);
        window.__timelines = window.__timelines || {};
        window.__timelines["breadcrumb-demo"] = tl;
      </script>
    </div>
  </body>
</html>
