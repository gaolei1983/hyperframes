<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Navigation Menu - Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #demo {
        width: 1920px;
        height: 1080px;
        display: grid;
        place-items: center;
        background: #f7f7f8;
        font-family: Inter, system-ui, sans-serif;
      }
      .demo-frame {
        display: grid;
        place-items: center;
        min-width: 760px;
        min-height: 480px;
        padding: 56px;
      }
      .hf-ui-navigation-menu {
        position: relative;
        display: inline-flex;
        gap: 4px;
        padding: 5px;
        border: 1px solid #e4e4e7;
        border-radius: 12px;
        background: #fff;
        color: #18181b;
        font-family: Inter, system-ui, sans-serif;
      }
      .hf-ui-navigation-menu a {
        padding: 10px 13px;
        border-radius: 9px;
        font-weight: 850;
      }
      .hf-ui-navigation-menu [aria-current="page"] {
        background: #f4f4f5;
      }
      .hf-ui-navigation-menu div {
        position: absolute;
        top: 54px;
        left: 0;
        width: 280px;
        padding: 14px;
        border: 1px solid #e4e4e7;
        border-radius: 12px;
        background: #fff;
        box-shadow: 0 20px 56px rgba(24, 24, 27, 0.12);
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <div
      id="demo"
      data-composition-id="navigation-menu-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5"
    >
      <div class="demo-frame">
        <nav class="hf-ui-navigation-menu">
          <a>Product</a><a aria-current="page">Templates</a><a>Docs</a>
          <div>Featured: launch video kit</div>
        </nav>
      </div>
      <script>
        const tl = gsap.timeline({ paused: true });
        const startTime = 0.45;
        tl.fromTo(
          ".hf-ui-navigation-menu div",
          { opacity: 0, y: 10 },
          { opacity: 1, y: 0, duration: 0.26, ease: "power2.out" },
          startTime,
        );
        tl.set({}, {}, 5);
        window.__timelines = window.__timelines || {};
        window.__timelines["navigation-menu-demo"] = tl;
      </script>
    </div>
  </body>
</html>
