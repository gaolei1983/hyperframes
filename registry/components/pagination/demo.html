<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Pagination - Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #demo {
        width: 1920px;
        height: 1080px;
        display: grid;
        place-items: center;
        background: #f7f7f8;
        font-family: Inter, system-ui, sans-serif;
      }
      .demo-frame {
        display: grid;
        place-items: center;
        min-width: 760px;
        min-height: 480px;
        padding: 56px;
      }
      .hf-ui-pagination {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-family: Inter, system-ui, sans-serif;
      }
      .hf-ui-pagination :is(a, button) {
        display: grid;
        place-items: center;
        min-width: 38px;
        height: 38px;
        padding: 0 11px;
        border: 1px solid #e4e4e7;
        border-radius: 9px;
        background: #fff;
        color: #18181b;
        font-weight: 800;
      }
      .hf-ui-pagination [aria-current="page"] {
        background: #18181b;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div
      id="demo"
      data-composition-id="pagination-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5"
    >
      <div class="demo-frame">
        <nav class="hf-ui-pagination" aria-label="Pagination">
          <button type="button">Prev</button><a>1</a><a aria-current="page">2</a><a>3</a
          ><button type="button">Next</button>
        </nav>
      </div>
      <script>
        const tl = gsap.timeline({ paused: true });
        const startTime = 0.45;
        tl.fromTo(
          ".hf-ui-pagination > *",
          { opacity: 0, y: 10 },
          { opacity: 1, y: 0, duration: 0.2, stagger: 0.035, ease: "power2.out" },
          startTime,
        );
        tl.set({}, {}, 5);
        window.__timelines = window.__timelines || {};
        window.__timelines["pagination-demo"] = tl;
      </script>
    </div>
  </body>
</html>
