<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Table - Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #demo {
        width: 1920px;
        height: 1080px;
        display: grid;
        place-items: center;
        background: #f7f7f8;
        font-family: Inter, system-ui, sans-serif;
      }
      .demo-frame {
        display: grid;
        place-items: center;
        min-width: 760px;
        min-height: 480px;
        padding: 56px;
      }
      .hf-ui-table {
        width: 520px;
        border-collapse: separate;
        border-spacing: 0;
        overflow: hidden;
        border: 1px solid #e4e4e7;
        border-radius: 12px;
        background: #fff;
        color: #18181b;
        font-family: Inter, system-ui, sans-serif;
        box-shadow: 0 18px 48px rgba(24, 24, 27, 0.1);
      }
      .hf-ui-table th,
      .hf-ui-table td {
        padding: 13px 16px;
        text-align: left;
        border-bottom: 1px solid #f1f1f4;
        font-size: 14px;
      }
      .hf-ui-table th {
        background: #fafafa;
        color: #71717a;
        font-size: 12px;
        font-weight: 850;
        text-transform: uppercase;
      }
      .hf-ui-table tr:last-child td {
        border-bottom: 0;
      }
    </style>
  </head>
  <body>
    <div
      id="demo"
      data-composition-id="table-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5"
    >
      <div class="demo-frame">
        <table class="hf-ui-table">
          <thead>
            <tr>
              <th>Scene</th>
              <th>Status</th>
              <th>Time</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>Intro</td>
              <td>Ready</td>
              <td>0:04</td>
            </tr>
            <tr>
              <td>Demo</td>
              <td>Rendering</td>
              <td>0:12</td>
            </tr>
            <tr>
              <td>CTA</td>
              <td>Queued</td>
              <td>0:03</td>
            </tr>
          </tbody>
        </table>
      </div>
      <script>
        const tl = gsap.timeline({ paused: true });
        const startTime = 0.45;
        tl.fromTo(
          ".hf-ui-table tbody tr",
          { opacity: 0, y: 12 },
          { opacity: 1, y: 0, duration: 0.24, stagger: 0.08, ease: "power2.out" },
          startTime,
        );
        tl.set({}, {}, 5);
        window.__timelines = window.__timelines || {};
        window.__timelines["table-demo"] = tl;
      </script>
    </div>
  </body>
</html>
