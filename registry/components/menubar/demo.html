<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Menubar - Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #demo {
        width: 1920px;
        height: 1080px;
        display: grid;
        place-items: center;
        background: #f7f7f8;
        font-family: Inter, system-ui, sans-serif;
      }
      .demo-frame {
        display: grid;
        place-items: center;
        min-width: 760px;
        min-height: 480px;
        padding: 56px;
      }
      .hf-ui-menubar {
        display: inline-flex;
        gap: 3px;
        padding: 4px;
        border: 1px solid #e4e4e7;
        border-radius: 10px;
        background: #fff;
        font-family: Inter, system-ui, sans-serif;
        box-shadow: 0 12px 32px rgba(24, 24, 27, 0.08);
      }
      .hf-ui-menubar button {
        height: 32px;
        padding: 0 12px;
        border: 0;
        border-radius: 7px;
        background: transparent;
        color: #18181b;
        font-weight: 800;
      }
      .hf-ui-menubar button:first-child {
        background: #f4f4f5;
      }
    </style>
  </head>
  <body>
    <div
      id="demo"
      data-composition-id="menubar-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5"
    >
      <div class="demo-frame">
        <nav class="hf-ui-menubar" aria-label="Editor menu">
          <button>File</button><button>Edit</button><button>View</button><button>Export</button>
        </nav>
      </div>
      <script>
        const tl = gsap.timeline({ paused: true });
        const startTime = 0.45;
        tl.fromTo(
          ".hf-ui-menubar button",
          { opacity: 0, y: -8 },
          { opacity: 1, y: 0, duration: 0.18, stagger: 0.035, ease: "power2.out" },
          startTime,
        );
        tl.set({}, {}, 5);
        window.__timelines = window.__timelines || {};
        window.__timelines["menubar-demo"] = tl;
      </script>
    </div>
  </body>
</html>
