<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Native Select - Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #demo {
        width: 1920px;
        height: 1080px;
        display: grid;
        place-items: center;
        background: #f7f7f8;
        font-family: Inter, system-ui, sans-serif;
      }
      .demo-frame {
        display: grid;
        place-items: center;
        min-width: 760px;
        min-height: 480px;
        padding: 56px;
      }
      .hf-ui-native-select {
        display: grid;
        gap: 8px;
        width: 240px;
        color: #18181b;
        font-family: Inter, system-ui, sans-serif;
      }
      .hf-ui-native-select span {
        font-size: 13px;
        font-weight: 800;
      }
      .hf-ui-native-select select {
        height: 42px;
        padding: 0 38px 0 13px;
        border: 1px solid #d4d4d8;
        border-radius: 10px;
        background: #fff;
        color: #18181b;
        font:
          750 15px/1 Inter,
          system-ui,
          sans-serif;
        appearance: none;
        box-shadow: 0 0 0 var(--hf-select-ring, 0px) rgba(24, 24, 27, 0.1);
      }
    </style>
  </head>
  <body>
    <div
      id="demo"
      data-composition-id="native-select-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5"
    >
      <div class="demo-frame">
        <label class="hf-ui-native-select"
          ><span>Quality</span
          ><select>
            <option>1080p</option>
            <option>4K</option>
          </select></label
        >
      </div>
      <script>
        const tl = gsap.timeline({ paused: true });
        const startTime = 0.45;
        tl.fromTo(
          ".hf-ui-native-select select",
          { "--hf-select-ring": "0px" },
          { "--hf-select-ring": "5px", duration: 0.24, ease: "power2.out" },
          startTime,
        );
        tl.set({}, {}, 5);
        window.__timelines = window.__timelines || {};
        window.__timelines["native-select-demo"] = tl;
      </script>
    </div>
  </body>
</html>
