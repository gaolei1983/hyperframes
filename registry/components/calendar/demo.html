<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Calendar - Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #demo {
        width: 1920px;
        height: 1080px;
        display: grid;
        place-items: center;
        background: #f7f7f8;
        font-family: Inter, system-ui, sans-serif;
      }
      .demo-frame {
        display: grid;
        place-items: center;
        min-width: 760px;
        min-height: 480px;
        padding: 56px;
      }
      .hf-ui-calendar {
        display: grid;
        gap: 14px;
        width: 300px;
        padding: 18px;
        border: 1px solid #e4e4e7;
        border-radius: 14px;
        background: #fff;
        color: #18181b;
        font-family: Inter, system-ui, sans-serif;
      }
      .hf-ui-calendar header {
        font-size: 18px;
        font-weight: 900;
      }
      .hf-ui-calendar-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 6px;
      }
      .hf-ui-calendar-grid :is(span, strong) {
        display: grid;
        place-items: center;
        height: 34px;
        border-radius: 9px;
        font-size: 13px;
      }
      .hf-ui-calendar-grid strong {
        background: #18181b;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div
      id="demo"
      data-composition-id="calendar-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5"
    >
      <div class="demo-frame">
        <div class="hf-ui-calendar">
          <header>June 2026</header>
          <div class="hf-ui-calendar-grid">
            <span>22</span><span>23</span><strong>24</strong><span>25</span><span>26</span
            ><span>27</span><span>28</span>
          </div>
        </div>
      </div>
      <script>
        const tl = gsap.timeline({ paused: true });
        const startTime = 0.45;
        tl.fromTo(
          ".hf-ui-calendar-grid > *",
          { opacity: 0, scale: 0.8 },
          { opacity: 1, scale: 1, duration: 0.18, stagger: 0.03, ease: "back.out(1.6)" },
          startTime,
        );
        tl.set({}, {}, 5);
        window.__timelines = window.__timelines || {};
        window.__timelines["calendar-demo"] = tl;
      </script>
    </div>
  </body>
</html>
