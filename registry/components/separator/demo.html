<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Separator - Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #demo {
        width: 1920px;
        height: 1080px;
        display: grid;
        place-items: center;
        background: #f7f7f8;
        font-family: Inter, system-ui, sans-serif;
      }
      .demo-frame {
        display: grid;
        place-items: center;
        min-width: 760px;
        min-height: 480px;
        padding: 56px;
      }
      .hf-ui-separator {
        --hf-separator-progress: 1;
        width: 360px;
        height: 1px;
        background: #e4e4e7;
        overflow: hidden;
      }
      .hf-ui-separator span {
        display: block;
        width: calc(var(--hf-separator-progress) * 100%);
        height: 100%;
        background: #18181b;
        transform-origin: left center;
      }
      .hf-ui-separator[data-orientation="vertical"] {
        width: 1px;
        height: 180px;
      }
    </style>
  </head>
  <body>
    <div
      id="demo"
      data-composition-id="separator-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5"
    >
      <div class="demo-frame">
        <div class="hf-ui-separator" role="separator"><span></span></div>
      </div>
      <script>
        const tl = gsap.timeline({ paused: true });
        const startTime = 0.45;
        tl.fromTo(
          ".hf-ui-separator",
          { "--hf-separator-progress": 0 },
          { "--hf-separator-progress": 1, duration: 0.42, ease: "power2.out" },
          startTime,
        );
        tl.set({}, {}, 5);
        window.__timelines = window.__timelines || {};
        window.__timelines["separator-demo"] = tl;
      </script>
    </div>
  </body>
</html>
