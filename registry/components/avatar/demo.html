<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Avatar - Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #demo {
        width: 1920px;
        height: 1080px;
        display: grid;
        place-items: center;
        background: #f7f7f8;
        font-family: Inter, system-ui, sans-serif;
      }
      .demo-frame {
        display: grid;
        place-items: center;
        min-width: 760px;
        min-height: 480px;
        padding: 56px;
      }
      .hf-ui-avatar {
        --hf-avatar-size: 54px;
        position: relative;
        display: grid;
        place-items: center;
        width: var(--hf-avatar-size);
        height: var(--hf-avatar-size);
        border: 3px solid #fff;
        border-radius: 999px;
        background: linear-gradient(135deg, #111827, #0ea5e9);
        color: white;
        font:
          850 15px/1 Inter,
          system-ui,
          sans-serif;
        box-shadow: 0 12px 32px rgba(2, 132, 199, 0.26);
      }
      .hf-ui-avatar i {
        position: absolute;
        right: 1px;
        bottom: 1px;
        width: 13px;
        height: 13px;
        border: 2px solid #fff;
        border-radius: 999px;
        background: #22c55e;
      }
    </style>
  </head>
  <body>
    <div
      id="demo"
      data-composition-id="avatar-demo"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="5"
    >
      <div class="demo-frame">
        <div class="hf-ui-avatar" aria-label="Maya Chen">
          <span>MC</span>
          <i aria-hidden="true"></i>
        </div>
      </div>
      <script>
        const tl = gsap.timeline({ paused: true });
        const startTime = 0.45;
        tl.fromTo(
          ".hf-ui-avatar",
          { opacity: 0, scale: 0.75, y: 12 },
          { opacity: 1, scale: 1, y: 0, duration: 0.38, ease: "back.out(1.8)" },
          startTime,
        );
        tl.set({}, {}, 5);
        window.__timelines = window.__timelines || {};
        window.__timelines["avatar-demo"] = tl;
      </script>
    </div>
  </body>
</html>
