<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>scene-01-css-transitions-grid</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@500;700&display=swap"
    rel="stylesheet"
  />
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; }

    [data-composition-id="scene-01-css-transitions-grid"] {
      width: 1920px; height: 1080px;
      position: relative; overflow: hidden;
      background: #0a0a0a;
      color: #f5f5f7;
      font-family: "Space Grotesk", "Inter", sans-serif;
    }

    /* === GRID === */
    [data-composition-id="scene-01-css-transitions-grid"] .grid {
      position: absolute;
      top: 80px; left: 80px;
      width: 1760px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(2, auto);
      column-gap: 60px;
      row-gap: 56px;
    }

    [data-composition-id="scene-01-css-transitions-grid"] .demo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    [data-composition-id="scene-01-css-transitions-grid"] .panel {
      position: relative;
      width: 540px;
      height: 360px;
      border-radius: 14px;
      overflow: hidden;
      background: #050505;
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 8px 30px rgba(0,0,0,0.45);
    }

    /* perspective wrapper for 3D flip — sits ON the panel */
    [data-composition-id="scene-01-css-transitions-grid"] .panel-3d {
      perspective: 1200px;
    }
    [data-composition-id="scene-01-css-transitions-grid"] .flip-stage {
      position: absolute; inset: 0;
      transform-style: preserve-3d;
      will-change: transform;
    }

    [data-composition-id="scene-01-css-transitions-grid"] .beat {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      will-change: transform, opacity, filter;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }
    [data-composition-id="scene-01-css-transitions-grid"] .beat .label {
      font-family: "Space Grotesk", sans-serif;
      font-weight: 700;
      font-size: 92px;
      letter-spacing: -0.04em;
      line-height: 1;
      color: #fafaf2;
      text-shadow: 0 2px 18px rgba(0,0,0,0.35);
    }

    /* Beat A color base */
    [data-composition-id="scene-01-css-transitions-grid"] .beat-a {
      background: linear-gradient(135deg, #2a4a8a 0%, #3b82f6 100%);
    }
    [data-composition-id="scene-01-css-transitions-grid"] .beat-b {
      background: linear-gradient(135deg, #b8385f 0%, #ec4899 100%);
    }

    /* Per-demo color overrides */
    [data-composition-id="scene-01-css-transitions-grid"] .d1 .beat-a { background: linear-gradient(135deg, #1f3a5f, #3b82f6); }
    [data-composition-id="scene-01-css-transitions-grid"] .d1 .beat-b { background: linear-gradient(135deg, #7a2842, #ec4899); }

    [data-composition-id="scene-01-css-transitions-grid"] .d2 .beat-a { background: linear-gradient(135deg, #0c4a3b, #22c55e); }
    [data-composition-id="scene-01-css-transitions-grid"] .d2 .beat-b { background: linear-gradient(135deg, #4a2410, #f59e0b); }

    [data-composition-id="scene-01-css-transitions-grid"] .d3 .beat-a { background: linear-gradient(135deg, #2a0a4a, #8b5cf6); }
    [data-composition-id="scene-01-css-transitions-grid"] .d3 .beat-b { background: linear-gradient(135deg, #08434a, #22d3ee); }

    [data-composition-id="scene-01-css-transitions-grid"] .d4 .beat-a { background: linear-gradient(135deg, #4d2a00, #f59e0b); }
    [data-composition-id="scene-01-css-transitions-grid"] .d4 .beat-b { background: linear-gradient(135deg, #4d0019, #ef4444); }

    [data-composition-id="scene-01-css-transitions-grid"] .d5 .beat-a { background: linear-gradient(135deg, #1c1c2e, #4a4a73); }
    [data-composition-id="scene-01-css-transitions-grid"] .d5 .beat-b { background: linear-gradient(135deg, #082b1f, #22c55e); }

    [data-composition-id="scene-01-css-transitions-grid"] .d6 .beat-a { background: linear-gradient(135deg, #14233a, #3b82f6); }
    [data-composition-id="scene-01-css-transitions-grid"] .d6 .beat-b { background: linear-gradient(135deg, #4a1a3b, #d4738a); }

    /* Light leak overlay */
    [data-composition-id="scene-01-css-transitions-grid"] .leak {
      position: absolute;
      top: -20%;
      bottom: -20%;
      width: 50%;
      left: -60%;
      background: linear-gradient(
        100deg,
        rgba(255,255,255,0) 0%,
        rgba(255, 220, 160, 0.85) 35%,
        rgba(255, 255, 255, 1) 50%,
        rgba(255, 220, 160, 0.85) 65%,
        rgba(255,255,255,0) 100%
      );
      filter: blur(14px);
      will-change: transform, opacity;
      transform: rotate(8deg);
      pointer-events: none;
      z-index: 5;
      opacity: 0;
    }

    /* Caption under each panel */
    [data-composition-id="scene-01-css-transitions-grid"] .caption {
      font-family: "JetBrains Mono", monospace;
      font-size: 17px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #c4c4c4;
      font-weight: 600;
    }
    [data-composition-id="scene-01-css-transitions-grid"] .caption .num {
      color: #f59e0b;
      margin-right: 10px;
    }

    /* Title block at top */
    [data-composition-id="scene-01-css-transitions-grid"] .title-bar {
      position: absolute;
      top: 18px; left: 80px;
      font-family: "JetBrains Mono", monospace;
      font-size: 14px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #8a8a8a;
      font-weight: 600;
    }
    [data-composition-id="scene-01-css-transitions-grid"] .title-bar .accent { color: #f5f5f5; }

    .scene-label {
      position: absolute; left: 80px; bottom: 24px;
      font-size: 15px; color: #707070;
      letter-spacing: 0.10em; text-transform: uppercase;
      font-weight: 500; z-index: 100;
      font-family: "Inter", sans-serif;
    }
    .scene-label .accent { color: #f5f5f5; font-weight: 600; }
  </style>
</head>
<body>
  <div id="scene-01-css-transitions-grid"
       data-composition-id="scene-01-css-transitions-grid"
       data-start="0"
       data-duration="5"
       data-width="1920"
       data-height="1080"
       style="width:1920px; height:1080px;">

    <div class="title-bar">CSS Transitions <span class="accent">// six techniques</span></div>

    <div class="grid">

      <!-- 1. PUSH -->
      <div class="demo d1">
        <div class="panel" id="p1">
          <div class="beat beat-a" id="p1a"><div class="label">A</div></div>
          <div class="beat beat-b" id="p1b"><div class="label">B</div></div>
        </div>
        <div class="caption"><span class="num">01</span>PUSH</div>
      </div>

      <!-- 2. SCALE -->
      <div class="demo d2">
        <div class="panel" id="p2">
          <div class="beat beat-a" id="p2a"><div class="label">A</div></div>
          <div class="beat beat-b" id="p2b"><div class="label">B</div></div>
        </div>
        <div class="caption"><span class="num">02</span>SCALE</div>
      </div>

      <!-- 3. BLUR DISSOLVE -->
      <div class="demo d3">
        <div class="panel" id="p3">
          <div class="beat beat-a" id="p3a"><div class="label">A</div></div>
          <div class="beat beat-b" id="p3b"><div class="label">B</div></div>
        </div>
        <div class="caption"><span class="num">03</span>BLUR DISSOLVE</div>
      </div>

      <!-- 4. 3D FLIP -->
      <div class="demo d4">
        <div class="panel panel-3d" id="p4">
          <div class="flip-stage" id="p4stage">
            <div class="beat beat-a" id="p4a"><div class="label">A</div></div>
            <div class="beat beat-b" id="p4b"><div class="label">B</div></div>
          </div>
        </div>
        <div class="caption"><span class="num">04</span>3D FLIP</div>
      </div>

      <!-- 5. LIGHT LEAK WIPE -->
      <div class="demo d5">
        <div class="panel" id="p5">
          <div class="beat beat-a" id="p5a"><div class="label">A</div></div>
          <div class="beat beat-b" id="p5b"><div class="label">B</div></div>
          <div class="leak" id="p5leak"></div>
        </div>
        <div class="caption"><span class="num">05</span>LIGHT LEAK</div>
      </div>

      <!-- 6. DISSOLVE -->
      <div class="demo d6">
        <div class="panel" id="p6">
          <div class="beat beat-a" id="p6a"><div class="label">A</div></div>
          <div class="beat beat-b" id="p6b"><div class="label">B</div></div>
        </div>
        <div class="caption"><span class="num">06</span>DISSOLVE</div>
      </div>

    </div>

    <div class="scene-label">
      Scene 01 &middot; <span class="accent">CSS Transitions Grid</span> &middot; 6 CSS-only transitions side-by-side
    </div>
  </div>

  <script>
    (function () {
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });
      var root = document.getElementById("scene-01-css-transitions-grid");
      if (!root) return;

      var DUR = 5.0;
      var STAGGER = [1.0, 1.5, 2.0, 2.5, 3.0, 3.5]; // each panel's transition start time

      // ---- helpers ----
      function id(s) { return document.getElementById(s); }

      // ==== INITIAL STATES (CSS-locked via GSAP set so order matches each transition) ====

      // Panel 1: Push — A at center, B off-stage right
      gsap.set(id("p1a"), { x: 0, opacity: 1 });
      gsap.set(id("p1b"), { x: 540, opacity: 1 });

      // Panel 2: Scale — A center scale 1, B scale 0.4 + opacity 0
      gsap.set(id("p2a"), { scale: 1, opacity: 1, transformOrigin: "50% 50%" });
      gsap.set(id("p2b"), { scale: 0.4, opacity: 0, transformOrigin: "50% 50%" });

      // Panel 3: Blur dissolve — A clear opaque, B blurred + invisible
      gsap.set(id("p3a"), { filter: "blur(0px)", opacity: 1 });
      gsap.set(id("p3b"), { filter: "blur(24px)", opacity: 0 });

      // Panel 4: 3D Flip — A facing camera (0deg), B rotated +180 (back)
      // We rotate the stage; A and B sit on opposite faces. Backface hidden hides whichever is facing away.
      gsap.set(id("p4a"), { rotationY: 0 });
      gsap.set(id("p4b"), { rotationY: 180 });
      gsap.set(id("p4stage"), { rotationY: 0, transformOrigin: "50% 50%" });

      // Panel 5: Light leak — A visible, B hidden, leak off-stage left and transparent
      gsap.set(id("p5a"), { opacity: 1 });
      gsap.set(id("p5b"), { opacity: 0 });
      gsap.set(id("p5leak"), { xPercent: 0, opacity: 0 });

      // Panel 6: Dissolve — A opaque, B transparent
      gsap.set(id("p6a"), { opacity: 1 });
      gsap.set(id("p6b"), { opacity: 0 });

      // ==== ENTRY: panels are visible from t=0 (no flash), then subtle settle ====
      var panels = root.querySelectorAll(".panel, .demo .caption");
      gsap.set(panels, { opacity: 1, y: 0 });
      // Tiny breathing wobble on captions so the bottom of each tile has motion
      // throughout the scene (continuous-motion rule). Panels themselves don't
      // need entrance animation — the transitions ARE the motion.

      // ==== TRANSITION 1: PUSH (panel p1) ====
      // Beat A slides out left, Beat B slides in from right (coordinated)
      var T1 = STAGGER[0];
      tl.to(id("p1a"), { x: -540, duration: 0.65, ease: "power3.inOut" }, T1);
      tl.fromTo(id("p1b"),
        { x: 540, opacity: 1 },
        { x: 0, duration: 0.65, ease: "power3.inOut" },
        T1
      );

      // ==== TRANSITION 2: SCALE (panel p2) ====
      // Beat A scales down + fades, Beat B scales up + fades in
      var T2 = STAGGER[1];
      tl.to(id("p2a"), {
        scale: 0.4, opacity: 0,
        duration: 0.55, ease: "power4.out"
      }, T2);
      tl.fromTo(id("p2b"),
        { scale: 0.4, opacity: 0 },
        { scale: 1, opacity: 1, duration: 0.55, ease: "back.out(1.7)" },
        T2 + 0.05
      );

      // ==== TRANSITION 3: BLUR DISSOLVE (panel p3) ====
      // Beat A fades + increasing blur, Beat B fades in + decreasing blur
      var T3 = STAGGER[2];
      tl.to(id("p3a"), {
        filter: "blur(24px)", opacity: 0,
        duration: 0.7, ease: "expo.out"
      }, T3);
      tl.fromTo(id("p3b"),
        { filter: "blur(24px)", opacity: 0 },
        { filter: "blur(0px)", opacity: 1, duration: 0.7, ease: "expo.out" },
        T3 + 0.05
      );

      // ==== TRANSITION 4: 3D FLIP (panel p4) ====
      // Single coin-flip: stage rotates -180. A starts at 0 (facing), B starts at 180.
      // After rotation, stage is at -180 so B's local rotationY of 180 totals 0 (faces camera).
      // Use power2.inOut for natural coin-flip motion.
      var T4 = STAGGER[3];
      tl.to(id("p4stage"), {
        rotationY: -180, duration: 0.85, ease: "power2.inOut"
      }, T4);

      // ==== TRANSITION 5: LIGHT LEAK WIPE (panel p5) ====
      // Bright gradient wipes across; Beat A fades during wipe; Beat B revealed behind
      var T5 = STAGGER[4];
      tl.to(id("p5leak"), {
        opacity: 1, duration: 0.18, ease: "power2.out"
      }, T5);
      tl.to(id("p5leak"), {
        xPercent: 320, duration: 0.85, ease: "power2.inOut"
      }, T5);
      // Beat A fades out as leak passes
      tl.to(id("p5a"), {
        opacity: 0, duration: 0.35, ease: "power2.in"
      }, T5 + 0.25);
      // Beat B reveals behind the wipe peak
      tl.to(id("p5b"), {
        opacity: 1, duration: 0.35, ease: "power2.out"
      }, T5 + 0.40);
      // Leak fades on its way out
      tl.to(id("p5leak"), {
        opacity: 0, duration: 0.22, ease: "power2.in"
      }, T5 + 0.70);

      // ==== TRANSITION 6: DISSOLVE (panel p6) ====
      // Classic crossfade with cubic-bezier-ish ease
      var T6 = STAGGER[5];
      tl.to(id("p6a"), {
        opacity: 0, duration: 0.75, ease: "power2.inOut"
      }, T6);
      tl.fromTo(id("p6b"),
        { opacity: 0 },
        { opacity: 1, duration: 0.75, ease: "power2.inOut" },
        T6
      );

      // ==== Continuous ambient motion on captions (so nothing sits totally still) ====
      var captions = root.querySelectorAll(".caption");
      tl.to(captions, {
        opacity: 0.65, duration: 1.4, ease: "sine.inOut",
        yoyo: true, repeat: 2
      }, 1.0);

      // Pad timeline to full duration
      tl.to({}, { duration: DUR }, 0);

      window.__timelines["scene-01-css-transitions-grid"] = tl;
    })();
  </script>
</body>
</html>
